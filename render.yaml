services:
  - type: web
    name: leadgen-platform
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PYTHONPATH
        value: backend
      - key: DATABASE_URL
        value: sqlite:///./leadgen.db
      - key: COMPANY_NAME
        value: Your Company Name
      - key: SENDER_NAME
        value: Your Name
      - key: SENDER_TITLE
        value: Business Development Manager
      - key: COMPANY_WEBSITE
        value: https://yourcompany.com
      - key: COMPANY_PHONE
        value: "+44 XXXX XXXXXX"
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
