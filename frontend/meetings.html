<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Generation · Meetings</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      LeadGen
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/agencies.html">Agencies</a>
      <a class="nav-link" href="/communications.html">Communications</a>
      <a class="nav-link active" href="/meetings.html">Meetings</a>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">Meetings</h1>
      <p class="page-subtitle">Schedule and track meetings with UK care agencies</p>
    </div>
    <button class="btn btn-primary" onclick="openModal('meeting-modal')">
      📅 Schedule Meeting
    </button>
  </div>

  <!-- Calendar -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <span class="card-title">Calendar</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" onclick="prevMonth()">‹</button>
        <span id="cal-title" style="font-weight:600;min-width:160px;text-align:center"></span>
        <button class="btn btn-secondary btn-sm" onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="card-body">
      <div class="cal-grid" style="margin-bottom:8px">
        <div class="cal-day-name">Mon</div>
        <div class="cal-day-name">Tue</div>
        <div class="cal-day-name">Wed</div>
        <div class="cal-day-name">Thu</div>
        <div class="cal-day-name">Fri</div>
        <div class="cal-day-name">Sat</div>
        <div class="cal-day-name">Sun</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- Meetings list -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">All Meetings</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Agency</th>
            <th>Date & Time</th>
            <th>Duration</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="meetings-tbody">
          <tr><td colspan="6" style="text-align:center;padding:48px;color:var(--text-secondary)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Schedule Meeting Modal -->
<div class="modal-overlay" id="meeting-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <span class="modal-title">Schedule Meeting</span>
      <button class="modal-close" onclick="closeModal('meeting-modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="meeting-form">
        <div class="form-group">
          <label class="form-label">Agency *</label>
          <select class="form-control" id="m-agency" required>
            <option value="">Select agency…</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Meeting Title *</label>
          <input class="form-control" id="m-title" required placeholder="e.g. Introduction Call – Sunrise Care">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date & Time *</label>
            <input class="form-control" id="m-date" type="datetime-local" required>
          </div>
          <div class="form-group">
            <label class="form-label">Duration (minutes)</label>
            <select class="form-control" id="m-duration">
              <option value="15">15 min</option>
              <option value="30">30 min</option>
              <option value="45">45 min</option>
              <option value="60" selected>60 min</option>
              <option value="90">90 min</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Location / Video Link</label>
          <input class="form-control" id="m-location" placeholder="https://meet.google.com/xxx or office address">
        </div>
        <div class="form-group">
          <label class="form-label">Description / Agenda</label>
          <textarea class="form-control" id="m-description" placeholder="Meeting agenda or notes…"></textarea>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px">
          <input type="checkbox" id="m-send-invite" checked style="width:16px;height:16px;cursor:pointer">
          <label for="m-send-invite" class="form-label" style="margin:0;cursor:pointer">
            Send calendar invite (.ics) to agency
          </label>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
          <button type="button" class="btn btn-secondary" onclick="closeModal('meeting-modal')">Cancel</button>
          <button type="submit" id="schedule-btn" class="btn btn-primary">Schedule Meeting</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Meeting Notes Modal -->
<div class="modal-overlay" id="notes-modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-title">Meeting Notes</span>
      <button class="modal-close" onclick="closeModal('notes-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--surface-alt);border-radius:var(--radius-md);padding:16px;margin-bottom:20px">
        <div style="font-size:17px;font-weight:700" id="notes-title"></div>
        <div style="font-size:13px;color:var(--text-secondary);margin-top:4px">
          <span id="notes-agency"></span> · <span id="notes-date"></span>
        </div>
      </div>
      <form id="notes-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Meeting Status</label>
            <select class="form-control" id="n-status">
              <option value="scheduled">Scheduled</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
              <option value="no_show">No Show</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Outcome</label>
            <select class="form-control" id="n-outcome">
              <option value="">— Select outcome —</option>
              <option value="interested">Interested</option>
              <option value="follow_up">Follow Up Needed</option>
              <option value="not_interested">Not Interested</option>
              <option value="converted">Converted to Client</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Meeting Notes</label>
          <textarea class="form-control" id="n-notes" style="min-height:160px"
            placeholder="What was discussed? Key decisions, next steps, concerns raised…"></textarea>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px">
          <button type="button" class="btn btn-secondary" onclick="closeModal('notes-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Notes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/meetings.js"></script>
</body>
</html>
