<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Generation · Agencies</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      LeadGen
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link active" href="/agencies.html">Agencies</a>
      <a class="nav-link" href="/communications.html">Communications</a>
      <a class="nav-link" href="/meetings.html">Meetings</a>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">UK Care Agencies</h1>
      <p class="page-subtitle">Manage and discover UK care agencies</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <select id="scrape-count" class="form-control" style="width:140px;border-radius:var(--radius-pill)">
        <option value="25">25 agencies</option>
        <option value="50" selected>50 agencies</option>
        <option value="100">100 agencies</option>
      </select>
      <button id="find-btn" class="btn btn-primary" onclick="findAgencies()">
        🔍 Find Agencies
      </button>
      <button class="btn btn-secondary" onclick="newAgency()">+ Add Manually</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header" style="padding:20px 24px">
      <div class="toolbar" style="margin:0;flex:1">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="search-input" placeholder="Search agencies…" type="search">
        </div>
        <select id="status-filter" class="form-control" style="width:180px;border-radius:var(--radius-pill)">
          <option value="">All statuses</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="responded">Responded</option>
          <option value="meeting_scheduled">Meeting Scheduled</option>
          <option value="converted">Converted</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Agency Name</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Contact Person</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="agencies-tbody">
          <tr><td colspan="7" style="text-align:center;padding:48px;color:var(--text-secondary)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Agency Modal -->
<div class="modal-overlay" id="agency-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Agency</span>
      <button class="modal-close" onclick="closeModal('agency-modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="agency-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Agency Name *</label>
            <input class="form-control" id="f-name" required placeholder="e.g. Sunrise Care Agency">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="f-status">
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="responded">Responded</option>
              <option value="meeting_scheduled">Meeting Scheduled</option>
              <option value="converted">Converted</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-control" id="f-address" placeholder="Full address">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" id="f-phone" placeholder="+44 XXXX XXXXXX" type="tel">
          </div>
          <div class="form-group">
            <label class="form-label">Contact Person</label>
            <input class="form-control" id="f-contact" placeholder="Name of key contact">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-control" id="f-email" placeholder="contact@agency.co.uk" type="email">
          </div>
          <div class="form-group">
            <label class="form-label">Website</label>
            <input class="form-control" id="f-website" placeholder="https://agency.co.uk" type="url">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-control" id="f-notes" placeholder="Internal notes…"></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button type="button" class="btn btn-secondary" onclick="closeModal('agency-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Agency</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/agencies.js"></script>
</body>
</html>
